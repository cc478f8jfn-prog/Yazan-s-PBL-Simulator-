    function launchSimulator() {
        document.getElementById('home-screen').style.display = 'none';

    const occupations = ["software engineer", "medical student", "construction worker", "teacher", "professional athlete", "barista", "mechanic", "carpenter", "surgeon"];
    const sides = ["right", "left"];
    const genders = [{id: "male", pro: "He", pos: "his"}, {id: "female", pro: "She", pos: "her"}];

    const lesionTemplates = [
        {
            mechanism: "fell asleep with {pos} arm draped over a park bench after a party",
            exam: "demonstrates a profound 'wrist drop'. {pro} cannot extend the wrist or digits at the MCP joints. Sensory loss is noted over the posterior forearm and dorsal hand. Triceps reflex is completely normal.",

            options: ["Radial Nerve (Spiral Groove)", "Radial Nerve (Axilla)", "Posterior Interosseous Nerve", "Median Nerve (Elbow)"],
            answer: 0,
            explanation: "Classic 'Saturday Night Palsy'. Compression in the spiral groove affects the nerve AFTER the branches to the triceps have already exited in the axilla, hence preserved elbow extension but lost wrist/finger extension."
        },
        {
            mechanism: "has been using axillary crutches improperly for the past 3 weeks",
            exam: "presents with weakness in extending the elbow, wrist, and fingers. The triceps reflex is absent. Sensory loss extends down the posterior aspect of the entire arm, forearm, and dorsal hand.",
            diagnostic: "EMG: Denervation potentials noted in the triceps brachii, brachioradialis, and distal extensors.",
            options: ["Radial Nerve (Spiral Groove)", "Posterior Cord Lesion", "Radial Nerve (Axilla)", "C7 Radiculopathy"],
            answer: 2,
            explanation: "High radial nerve compression in the axilla knocks out the triceps (absent reflex) in addition to causing a wrist drop. This distinguishes it from a spiral groove lesion."
        },
        {
            mechanism: "suffered a direct blow to the proximal lateral forearm during a hockey game",
            exam: "cannot extend the fingers at the MCP joints or extend the thumb. Crucially, wrist extension is preserved but deviates radially. Sensation is entirely normal.",
            diagnostic: "NCV: Normal Sensory Nerve Action Potentials (SNAPs) in the superficial radial nerve. Motor block at the Arcade of Frohse.",
            options: ["Radial Nerve (Spiral Groove)", "Superficial Radial Nerve", "Posterior Interosseous Nerve (PIN)", "Anterior Interosseous Nerve (AIN)"],
            answer: 2,
            explanation: "PIN syndrome (compression at the supinator/Arcade of Frohse). It is a pure motor branch. ECRL is spared (innervated before the split), causing radial deviation upon wrist extension. No sensory loss."
        },
        {
            mechanism: "has been wearing a tightly fitted smartwatch continuously",
            exam: "complains of burning pain and numbness over the dorsal-lateral aspect of the hand. Motor examination of the hand and wrist is completely 5/5.",
            diagnostic: "Ultrasound: Focal entrapment of a nerve branch emerging between the brachioradialis and extensor carpi radialis longus tendons.",
            options: ["Posterior Interosseous Nerve", "Superficial Radial Nerve", "Median Nerve (Carpal Tunnel)", "Ulnar Nerve (Guyon's)"],
            answer: 1,
            explanation: "Wartenberg's Syndrome. Compression of the superficial sensory branch of the radial nerve. Pure sensory deficit over the anatomic snuffbox and dorsal web space with absolutely zero motor weakness."
        },
        {
            mechanism: "sustained a displaced supracondylar fracture of the humerus",
            exam: "When asked to make a fist, the index and middle fingers remain extended (Hand of Benediction). There is sensory loss over the lateral palm and lateral 3.5 digits.",
            diagnostic: "Radiograph: Severe anterior displacement of the proximal humeral fragment.\nEMG: Denervation in pronator teres, FCR, and lateral FDP.",
            options: ["Median Nerve (High Lesion)", "Ulnar Nerve (Elbow)", "Anterior Interosseous Nerve", "Median Nerve (Wrist)"],
            answer: 0,
            explanation: "High median nerve injury knocks out the FDS and the lateral half of the FDP, making it impossible to flex digits 2 and 3 when attempting a fist."
        },
        {
            mechanism: "presents with insidious onset of volar forearm pain",
            exam: "is unable to form an 'OK' sign, instead pinching the pads of the thumb and index finger flatly together. Sensation in the hand is completely normal.",
            diagnostic: "EMG: Isolated denervation of the Flexor Pollicis Longus (FPL) and the pronator quadratus.",
            options: ["Median Nerve (High Lesion)", "Posterior Interosseous Nerve", "Anterior Interosseous Nerve (AIN)", "Recurrent Motor Branch of Median"],
            answer: 2,
            explanation: "AIN syndrome. The AIN is a pure motor branch supplying the deep volar compartment (FPL, lateral FDP, pronator quadratus). Injury destroys flexion of the distal phalanges of the thumb and index finger."
        },
        {
            mechanism: "has been assembling furniture tightly gripping screwdrivers for 12 hours",
            exam: "complains of numbness in the thumb, index, and middle fingers, AND numbness over the fleshy base of the thumb (thenar eminence). Phalen's test at the wrist is negative.",
            diagnostic: "Exam: Provocative testing by resisting forearm pronation reproduces the pain and tingling.",
            options: ["Carpal Tunnel Syndrome", "Pronator Teres Syndrome", "Anterior Interosseous Nerve", "Thoracic Outlet Syndrome"],
            answer: 1,
            explanation: "Pronator syndrome traps the median nerve high in the forearm. The key differentiator from Carpal Tunnel is sensory loss over the thenar eminence (Palmar cutaneous branch), which branches OFF before the carpal tunnel."
        },
        {
            mechanism: "works long shifts typing at an unergonomic desk setup",
            exam: "reports waking up at night shaking {pos} hand due to burning pain in the index and middle fingers. Sensation over the thenar eminence is preserved.",
            diagnostic: "NCV: Prolonged distal latency across the flexor retinaculum. Normal conduction velocity in the forearm.",
            options: ["Pronator Teres Syndrome", "C6 Radiculopathy", "Ulnar Tunnel Syndrome", "Carpal Tunnel Syndrome"],
            answer: 3,
            explanation: "Classic CTS. Night pain is a hallmark. The palmar cutaneous branch passes OVER the flexor retinaculum, so sensation to the base of the thumb (thenar eminence) is perfectly spared."
        },
        {
            mechanism: "accidentally fell on broken glass, sustaining a laceration to the base of the palm",
            exam: "has normal sensation throughout all fingers. However, {pro} is entirely unable to oppose the thumb to the pinky finger, and the thumb rests in the same plane as the other fingers (Ape Hand).",
            diagnostic: "Surgical Exploration: Transection of a nerve branch lying superficially over the thenar musculature.",
            options: ["Median Nerve (Main Trunk)", "Recurrent Branch of Median Nerve", "Deep Branch of Ulnar Nerve", "Anterior Interosseous Nerve"],
            answer: 1,
            explanation: "The recurrent motor branch (the 'million dollar nerve') of the median nerve supplies the thenar compartment (Opponens pollicis, Abductor pollicis brevis, superficial flexor pollicis brevis). It has no sensory fibers."
        },
        {
            mechanism: "sustained a severe fracture to the medial epicondyle of the humerus",
            exam: "presents with a resting 'Claw Hand' posture affecting the ring and small fingers. {pro} has sensory loss over the medial aspect of the hand, both dorsally and volarly.",
            diagnostic: "NCV: Motor block at the elbow. Absent SNAPs in the dorsal ulnar cutaneous nerve distribution.",

            answer: 1,
            explanation: "High ulnar nerve lesion at the elbow. It affects both volar and dorsal sensation (because the dorsal ulnar cutaneous branch splits off in the distal forearm). It paradoxically causes a LESS severe claw than a wrist lesion (Ulnar Paradox) due to FDP paralysis."
        },
        {
            mechanism: "is an avid long-distance cyclist who rides 100 miles a week",
            exam: "demonstrates weakness in finger abduction (spreading fingers) and a positive Froment's sign. Sensation is lost on the palmar aspect of the pinky, but dorsal hand sensation is intact.",

        },
        {
            mechanism: "was violently thrown from a horse, landing on the top of the shoulder while the neck was forced in the opposite direction",
            exam: "The {side} arm hangs limply by the side, medially rotated, with the forearm pronated (Waiter's tip position).",
            diagnostic: "MRI: Avulsion injury of the C5 and C6 nerve roots.",
            options: ["Klumpke's Palsy", "Erb-Duchenne Palsy", "Axillary Nerve Injury", "Radial Nerve Palsy"],
            answer: 1,
            explanation: "Upper trunk lesion (Erb's Palsy). Knocks out the suprascapular (loss of lateral rotation), axillary (loss of abduction), and musculocutaneous nerves (loss of flexion/supination)."
        },
        {
            mechanism: "slipped from a tree and grabbed a branch overhead to arrest the fall",
            exam: "presents with a total clawing of all four fingers and sensory loss along the medial aspect of the arm. The ipsilateral pupil is constricted and the eyelid is drooping.",
            diagnostic: "Clinical: Atrophy of all intrinsic hand muscles. Positive Horner's Syndrome.",
            options: ["Erb's Palsy", "Klumpke's Palsy", "Thoracic Outlet Syndrome", "Pancoast Tumor"],
            answer: 1,
            explanation: "Lower trunk lesion (C8-T1). Upward traction tears the lower roots, paralyzing all intrinsic hand muscles. Involvement of T1 damages the sympathetic chain, causing Horner's syndrome."
        },
        {
            mechanism: "underwent an axillary lymph node dissection for breast cancer staging",
            exam: "complains of shoulder weakness. When asked to push against the wall, the medial border of the scapula wings outward prominently.",
            diagnostic: "EMG: Denervation isolated to the serratus anterior muscle.",
            options: ["Thoracodorsal Nerve", "Spinal Accessory Nerve", "Long Thoracic Nerve", "Suprascapular Nerve"],
            answer: 2,
            explanation: "The long thoracic nerve runs superficially along the lateral chest wall, making it highly vulnerable during axillary surgery. Denervation of serratus anterior causes scapular winging."
        },
        {
            mechanism: "underwent a biopsy of an enlarged lymph node in the posterior triangle of the neck",
            exam: "cannot shrug the {side} shoulder against resistance. The shoulder appears drooped, and there is mild lateral winging of the scapula.",
            diagnostic: "EMG: Denervation of the trapezius muscle. Serratus anterior function is normal.",
            options: ["Long Thoracic Nerve", "Spinal Accessory Nerve", "Dorsal Scapular Nerve", "Thoracodorsal Nerve"],
            answer: 1,
            explanation: "The spinal accessory nerve (CN XI) traverses the posterior triangle of the neck superficially. Iatrogenic injury during biopsy paralyzes the trapezius, causing shoulder droop and lateral (rotary) winging."
        },
        {
            mechanism: "suffered an anterior dislocation of the glenohumeral joint during a rugby tackle",
            exam: "The joint was reduced, but the patient now has an area of numbness over the lateral deltoid (regimental badge area) and weakness in arm abduction past 15 degrees.",
            diagnostic: "Radiograph: Joint is relocated. No fracture.\nExam: Deltoid atrophy is developing.",
            options: ["Suprascapular Nerve", "Musculocutaneous Nerve", "Axillary Nerve", "Radial Nerve"],
            answer: 2,
            explanation: "The axillary nerve wraps tightly around the surgical neck of the humerus. It is the most commonly injured nerve in anterior shoulder dislocations, paralyzing the deltoid and teres minor."
        },
        {
            mechanism: "sustained a deep stab wound to the anterior aspect of the mid-arm",
            exam: "cannot flex the elbow when the forearm is supinated. There is sensory loss strictly over the lateral aspect of the forearm.",
            diagnostic: "Exploration: Laceration traversing the belly of the coracobrachialis and biceps brachii muscles.",
            options: ["Median Nerve", "Radial Nerve", "Musculocutaneous Nerve", "Ulnar Nerve"],
            answer: 2,
            explanation: "The musculocutaneous nerve pierces the coracobrachialis, supplies the anterior arm compartment (biceps, brachialis), and terminates as the lateral antebrachial cutaneous nerve (sensation to lateral forearm)."
        },
        {
            mechanism: "sustained a severe gunshot wound traversing the high axilla",
            exam: "exhibits complete loss of elbow flexion and severe weakness in forearm pronation and wrist flexion. Sensation is completely lost over the lateral forearm and the lateral palm.",
            diagnostic: "EMG: Denervation of biceps brachii, brachialis, and pronator teres. Triceps function is completely spared.",
            options: ["Lateral Cord Lesion", "Medial Cord Lesion", "Musculocutaneous Nerve Trunk", "Upper Trunk Lesion"],
            answer: 0,
            explanation: "The lateral cord gives rise to the musculocutaneous nerve (biceps/brachialis, lateral forearm sensation) and the lateral root of the median nerve (pronator teres, FCR, lateral palm sensation). This combination of deficits perfectly isolates a lateral cord injury."
        },
        {
            mechanism: "was involved in a severe crush injury to the axillary region",
            exam: "presents with total paralysis of all intrinsic hand muscles and weakness in finger flexion. Sensory loss covers the entire medial aspect of the forearm and hand. No Horner's syndrome is present.",
            diagnostic: "NCV: Absent signals in the main ulnar nerve and the medial brachial/antebrachial cutaneous nerves.",
            options: ["Lower Trunk Lesion", "Medial Cord Lesion", "Ulnar Nerve Trunk", "T1 Radiculopathy"],
            answer: 1,
            explanation: "The medial cord supplies the ulnar nerve, the medial root of the median nerve, and the medial cutaneous nerves of the arm/forearm. It mimics a lower trunk lesion, but typically spares the T1 sympathetic chain (no Horner's syndrome)."
        },
        {
            mechanism: "has been relying heavily on poorly fitted axillary crutches after breaking a leg",
            exam: "is unable to extend the elbow, wrist, or fingers. Additionally, {pro} cannot abduct the shoulder past 15 degrees and has weakness in medial rotation.",
            diagnostic: "EMG: Denervation in the deltoid, triceps brachii, and latissimus dorsi.",
            options: ["Radial Nerve (High Axilla)", "Posterior Cord Lesion", "Upper Trunk Lesion", "C7 Radiculopathy"],
            answer: 1,
            explanation: "Deep axillary crutch compression can crush the entire Posterior Cord. This knocks out the Radial nerve (triceps/wrist extensors), Axillary nerve (deltoid), and Thoracodorsal nerve (latissimus dorsi)."
        },
        {
            mechanism: "is a young violinist presenting with arm pain, hand clumsiness, and a sensation of a 'cold hand'",
            exam: "demonstrates wasting of the thenar and hypothenar eminences. Sensation is diminished along the medial aspect of the forearm. Symptoms worsen significantly when the arm is elevated overhead.",
            diagnostic: "Radiograph: Presence of bilateral C7 cervical ribs.\nDoppler: Diminished radial pulse during Adson's maneuver.",
            options: ["Ulnar Nerve Entrapment", "C8/T1 Radiculopathy", "Thoracic Outlet Syndrome", "Pancoast Tumor"],
            answer: 2,
            explanation: "Neurogenic Thoracic Outlet Syndrome (TOS) typically involves compression of the lower trunk (C8-T1) by a cervical rib or scalene muscles. It presents with intrinsic hand weakness, medial forearm numbness, and positional vascular changes."
        },
        {
            mechanism: "is a professional volleyball player complaining of deep, dull posterior shoulder pain",
            exam: "demonstrates visible atrophy of the supraspinatus and infraspinatus fossae. {pro} has weakness in initiating shoulder abduction and external rotation. Sensation is perfectly normal.",
            diagnostic: "MRI: A paralabral ganglion cyst is compressing a nerve at the suprascapular notch.",
            options: ["Axillary Nerve", "Suprascapular Nerve (Suprascapular Notch)", "Spinal Accessory Nerve", "Suprascapular Nerve (Spinoglenoid Notch)"],
            answer: 1,
            explanation: "Entrapment at the suprascapular notch affects BOTH the supraspinatus (abduction initiation) and infraspinatus (external rotation). It is a pure motor nerve, hence no sensory loss."
        },
        {
            mechanism: "is a baseball pitcher who reports painless weakness in the throwing arm",
            exam: "has isolated weakness in external rotation of the shoulder. Supraspinatus strength (initiating abduction) and all shoulder sensation are completely intact.",
            diagnostic: "Ultrasound: Ganglion cyst compressing a nerve branch specifically at the spinoglenoid notch.",
            options: ["Axillary Nerve", "Suprascapular Nerve (Suprascapular Notch)", "Suprascapular Nerve (Spinoglenoid Notch)", "Lower Subscapular Nerve"],

            explanation: "After innervating the supraspinatus, the suprascapular nerve travels laterally through the spinoglenoid notch to reach the infraspinatus. Entrapment here causes isolated infraspinatus weakness (a pure external rotation deficit)."
        },
        {
            mechanism: "sustained a penetrating stab wound to the scalene triangle of the neck",
            exam: "exhibits a laterally winged scapula. The scapula rests further from the midline on the {side} side, and {pro} struggles to retract the shoulder blades together.",

        },
        {
            mechanism: "sustained a traction injury to the posterior axilla during a rock climbing fall",

            explanation: "Quadrangular space syndrome involves compression of the axillary nerve and posterior circumflex humeral artery by hypertrophied muscles (teres minor, teres major, long head of triceps, and the surgical neck of the humerus)."
        },

            mechanism: "is a mechanic who repeatedly uses the heel of {pos} hand as a hammer to lock in tight car parts",
            exam: "demonstrates severe atrophy of the interossei and a positive Froment's sign. Astonishingly, sensation in the ring and small fingers is completely intact.",
            diagnostic: "NCV: Normal sensory conduction to digits 4 and 5. Delayed motor conduction specifically to the first dorsal interosseous and adductor pollicis.",
            options: ["Ulnar Nerve (Main Trunk at Wrist)", "Deep Motor Branch of Ulnar Nerve", "Superficial Sensory Branch of Ulnar Nerve", "C8 Radiculopathy"],
            answer: 1,
            explanation: "Compression deep within Guyon's canal (often from a hook of hamate fracture or repetitive blunt trauma) can selectively hit the deep motor branch AFTER the superficial sensory branch has split off. This causes pure motor intrinsic weakness with zero sensory loss."
        },
        {
            mechanism: "works as a truck driver, habitually resting {pos} left elbow on the hard window sill for 10 hours a day",
            exam: "complains of numbness in the small finger and ulnar half of the ring finger. Tinel's sign is positive at the elbow. {pro} has early clawing of digits 4 and 5.",
            diagnostic: "EMG/NCV: Conduction block localized between the medial epicondyle and the olecranon. Denervation is noted in the flexor carpi ulnaris.",
            options: ["Guyon's Canal Syndrome", "Cubital Tunnel Syndrome", "Medial Cord Lesion", "Lower Trunk Lesion"],
            answer: 1,
            explanation: "Cubital tunnel syndrome is chronic ulnar nerve compression at the elbow. Unlike wrist lesions (Guyon's), it denervates the Flexor Carpi Ulnaris and the ulnar half of the FDP, and sensory loss involves the dorsal hand (because the dorsal cutaneous branch splits proximal to the wrist)."
        },
        {
            mechanism: "presents with aching volar forearm pain and numbness in the radial 3.5 digits",
            exam: "has weakness in forearm pronation, wrist flexion, and thumb opposition. A hard, bony spur is palpable on the anteromedial aspect of the distal humerus just above the elbow.",
            diagnostic: "Radiograph: An Avian spur (supracondylar process) is present on the distal humerus.",
            options: ["Pronator Teres Syndrome", "Carpal Tunnel Syndrome", "Median Nerve (Ligament of Struthers)", "Anterior Interosseous Nerve Syndrome"],
            answer: 2,
            explanation: "The Ligament of Struthers runs from a congenital supracondylar process down to the medial epicondyle. Median nerve compression here is HIGH (above the elbow), distinguishing it from Pronator Syndrome because it knocks out the Pronator Teres muscle itself."
        },
        {
            mechanism: "suffered a deep penetrating knife wound to the anterior upper arm",
            exam: "cannot flex the elbow when the forearm is in full supination. The biceps reflex is completely absent. There is a distinct strip of sensory loss along the lateral aspect of the forearm.",
            diagnostic: "NCV: Absent Sensory Nerve Action Potentials (SNAPs) in the lateral antebrachial cutaneous nerve. Motor denervation of the biceps and brachialis.",
            options: ["Musculocutaneous Nerve", "Radial Nerve", "Median Nerve", "Lateral Cord"],
            answer: 0,
            explanation: "The musculocutaneous nerve supplies the anterior compartment of the arm (coracobrachialis, biceps, brachialis) and terminates as the lateral antebrachial cutaneous nerve. Testing elbow flexion in supination isolates the biceps muscle from the brachioradialis."
        }
    ];

    let lastIndex = -1;

    function generateCase() {
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('next-button').style.display = 'none';

        let templateIndex;
        do {
            templateIndex = Math.floor(Math.random() * lesionTemplates.length);
        } while (templateIndex === lastIndex && lesionTemplates.length > 1);
        lastIndex = templateIndex;
        
        let template = lesionTemplates[templateIndex];

        let age = Math.floor(Math.random() * 52) + 18;
        let genderObj = genders[Math.floor(Math.random() * genders.length)];
        let occupation = occupations[Math.floor(Math.random() * occupations.length)];
        let side = sides[Math.floor(Math.random() * sides.length)];

        let vignette = `A ${age}-year-old ${genderObj.id} ${occupation} ${template.mechanism}. On examination, ${genderObj.pro.toLowerCase()} ${template.exam}`;
        vignette = vignette.replace(/{pro}/g, genderObj.pro).replace(/{pos}/g, genderObj.pos).replace(/{side}/g, side);

        document.getElementById('case-text').innerHTML = `<strong>Patient File:</strong><br><br>${vignette}`;
        document.getElementById('diagnostic-text').innerHTML = `[INVESTIGATIONS]<br>${template.diagnostic}`;

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        template.options.forEach((opt, idx) => {
            let btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(idx, btn, template);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, btn, template) {
        let buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);
        
        let feedback = document.getElementById('feedback-box');
        
        if (selectedIndex === template.answer) {
            btn.style.background = '#27ae60';
            btn.style.borderColor = '#2ecc71';
            feedback.className = 'feedback correct-feedback';
            feedback.innerHTML = `<strong>✓ Spot On.</strong><br><br>${template.explanation}`;
        } else {
            btn.style.background = '#c0392b';
            btn.style.borderColor = '#e74c3c';
            buttons[template.answer].style.background = '#27ae60';
            buttons[template.answer].style.borderColor = '#2ecc71';
            feedback.className = 'feedback incorrect-feedback';
            feedback.innerHTML = `<strong>✗ Incorrect Localization.</strong><br><br>${template.explanation}`;
        }
        
        feedback.style.display = 'block';
        document.getElementById('next-button').style.display = 'block';
    }
</script>
