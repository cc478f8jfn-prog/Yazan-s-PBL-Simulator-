<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazan's PBL Simulator</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --border-color: #333;
            --accent-color: #3498db;
            --accent-hover: #2980b9;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --correct-color: #2ecc71;
            --incorrect-color: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 15px 25px;
            background-color: #181818;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header img.logo-panel {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .header h1 {
            font-size: 1.2rem;
            margin: 0;
            color: #fff;
        }

        .content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .home-screen img.logo {
            width: 180px;
            height: 180px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 12px rgba(52, 152, 219, 0.4));
        }

        .home-screen h2 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
            color: #fff;
        }

        .home-screen p {
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        .start-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .start-btn:hover {
            background-color: var(--accent-hover);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-left">
                <img src="logo_panel" alt="Panel Logo" class="logo-panel">
                <h1>Yazan's PBL Simulator</h1>
            </div>
        </div>
        <div class="content">
            <div class="home-screen">
                <img src="logo" alt="Main Logo" class="logo">
                <h2>Upper Limb Nerve Injuries</h2>
                <p>Practice clinical problem-solving cases interactively.</p>
                <button class="start-btn" onclick="alert('Simulation starting...')">Start Case</button>
            </div>
        </div>
    </div>

</body>
</html>
